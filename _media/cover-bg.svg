<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="g1" cx="25%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="g2" cx="75%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#e2b04a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#e2b04a" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)"/>
  <rect width="100%" height="100%" fill="url(#g2)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <!-- Constellation dots -->
  <g fill="#e2b04a" opacity="0.15">
    <circle cx="200" cy="150" r="1.5"/><circle cx="350" cy="80" r="1"/><circle cx="500" cy="200" r="1.8"/>
    <circle cx="700" cy="120" r="1.2"/><circle cx="900" cy="180" r="1.5"/><circle cx="1100" cy="90" r="1"/>
    <circle cx="1250" cy="220" r="1.8"/><circle cx="150" cy="400" r="1"/><circle cx="400" cy="500" r="1.5"/>
    <circle cx="650" cy="450" r="1.2"/><circle cx="850" cy="550" r="1"/><circle cx="1050" cy="400" r="1.5"/>
    <circle cx="1300" cy="500" r="1.2"/><circle cx="300" cy="700" r="1.5"/><circle cx="550" cy="650" r="1"/>
    <circle cx="800" cy="750" r="1.8"/><circle cx="1000" cy="680" r="1.2"/><circle cx="1200" cy="780" r="1"/>
  </g>
  <!-- Connecting lines -->
  <g stroke="#e2b04a" stroke-width="0.4" opacity="0.06">
    <line x1="200" y1="150" x2="350" y2="80"/><line x1="350" y1="80" x2="500" y2="200"/>
    <line x1="500" y1="200" x2="700" y2="120"/><line x1="700" y1="120" x2="900" y2="180"/>
    <line x1="900" y1="180" x2="1100" y2="90"/><line x1="1100" y1="90" x2="1250" y2="220"/>
    <line x1="400" y1="500" x2="650" y2="450"/><line x1="650" y1="450" x2="850" y2="550"/>
    <line x1="850" y1="550" x2="1050" y2="400"/><line x1="1050" y1="400" x2="1300" y2="500"/>
  </g>
  <rect width="100%" height="100%" filter="url(#noise)" opacity="0.4"/>
</svg>
