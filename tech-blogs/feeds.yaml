# tech-blogs feeds — three-tier coverage of AI/ML/CS tech blogs
#
# Schema:
#   name:    Display name
#   url:     Human-readable home page
#   feed:    RSS / Atom URL.  null = no public feed (still tracked, but skipped
#            by RSS pipeline; needs HTML / sitemap fallback)
#   tier:    personal | company | academia | newsletter | conference
#   topics:  Free-form tags (used for digest grouping)
#   lang:    en (default) | zh
#
# Verified 2026-06-26.  When adding new sources, probe with:
#   curl -sI -L -A "Mozilla/5.0" "<feed-url>"
#   curl -sL  -A "Mozilla/5.0" "<feed-url>" | head -c 500   # must include <rss|<feed|<channel
#
# Many official labs (Anthropic, Mistral, xAI, Stanford HAI, AI2, MILA) have no
# RSS; they're listed with feed:null so the inventory stays complete and shows
# up under --list-missing.  Plan: HTML/sitemap fallback (not yet implemented).

