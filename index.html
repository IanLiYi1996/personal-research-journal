<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Li Yi's Research Journal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A personal research journal tracking AI, NLP, and ML explorations.">
  <meta name="theme-color" content="#09090b">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
  <!-- Base dark theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <!-- Prism syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <!-- Swiper carousel -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <!-- KaTeX math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <!-- Custom theme override -->
  <link rel="stylesheet" href="_media/custom.css">
</head>
<body>
  <!-- Reading progress bar -->
  <div class="reading-progress" id="reading-progress"></div>
  <!-- Theme toggle button -->
  <button id="theme-toggle" title="Toggle theme">🌙</button>
  <!-- Back to top button -->
  <div id="back-to-top">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
  </div>
  <!-- Theme init (runs before render to prevent flash) -->
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>

  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '<span style="opacity:0.5">📓</span> Research Journal',
      nameLink: '/',
      repo: 'https://github.com/IanLiYi1996/personal-research-journal',
      homepage: '_home.md',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        placeholder: '搜索 / Search...',
        noData: 'No results.',
        depth: 6,
        hideOtherSidebarContent: true,
        paths: 'auto',
        namespace: 'research-journal'
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied'
      },
      pagination: {
        previousText: 'Prev',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true
      },
      'flexible-alerts': {
        style: 'callout',
        note:      { label: { en: 'Note',      zh: '注意' } },
        tip:       { label: { en: 'Tip',        zh: '提示' } },
        warning:   { label: { en: 'Warning',    zh: '警告' } },
        attention: { label: { en: 'Important',  zh: '重要' } }
      },
      tabs: {
        persist: true,
        sync: true
      },
      plugins: [
        // Kill sidebar arrows + back-to-top + reading progress + theme toggle
        function(hook) {
          hook.ready(function() {
            // Inject style AFTER all CSS to override docsify-themeable arrows
            var s = document.createElement('style');
            s.textContent = '.sidebar-nav a::before, .sidebar-nav a:before, .sidebar-nav strong::before, .sidebar-nav strong:before { content: none !important; display: none !important; }';
            document.head.appendChild(s);
          });
          hook.doneEach(function() {
            // Back-to-top & progress bar
            var btn = document.getElementById('back-to-top');
            function onScroll() {
              var main = document.querySelector('.content');
              if (!main) return;
              var scrollTop = main.scrollTop || window.pageYOffset || document.documentElement.scrollTop;
              btn.classList.toggle('visible', scrollTop > 400);
              var bar = document.getElementById('reading-progress');
              var docHeight = main.scrollHeight - main.clientHeight;
              bar.style.width = docHeight > 0 ? (scrollTop / docHeight * 100) + '%' : '0%';
            }
            var main = document.querySelector('.content');
            if (main) { main.addEventListener('scroll', onScroll); onScroll(); }
            window.addEventListener('scroll', onScroll);
            btn.onclick = function() {
              var m = document.querySelector('.content');
              if (m) m.scrollTo({ top: 0, behavior: 'smooth' });
              window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Theme toggle
            var toggle = document.getElementById('theme-toggle');
            function updateIcon() {
              var isLight = document.documentElement.getAttribute('data-theme') === 'light';
              toggle.textContent = isLight ? '☀️' : '🌙';
              toggle.title = isLight ? 'Switch to dark mode' : 'Switch to light mode';
            }
            updateIcon();
            toggle.onclick = function() {
              var isLight = document.documentElement.getAttribute('data-theme') === 'light';
              if (isLight) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'dark');
              } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
              }
              updateIcon();
            };

            // Remove sidebar arrow indicators
            document.querySelectorAll('.sidebar-nav a, .sidebar-nav strong').forEach(function(el) {
              el.childNodes.forEach(function(node) {
                if (node.nodeType === 3 && node.textContent) {
                  node.textContent = node.textContent.replace(/^\s*>\s*/, '');
                }
              });
              // Also check for span/element-based arrows
              el.querySelectorAll('span').forEach(function(span) {
                if (span.textContent.trim() === '>' || span.textContent.trim() === '›') {
                  span.remove();
                }
              });
            });

            // Homepage: hide sidebar; other pages: show sidebar
            var isHome = !location.hash || location.hash === '#/' || location.hash === '#/?';
            var body = document.body;
            if (isHome) {
              body.classList.add('close');
              body.classList.add('home-page');
            } else {
              body.classList.remove('close');
              body.classList.remove('home-page');
            }

            // Show aurora only on homepage
            var aurora = document.getElementById('home-aurora');
            if (aurora) {
              aurora.style.display = 'block';
            }

            // Arc Gallery Hero — position cards on a semicircle
            var pivot = document.getElementById('arc-pivot');
            if (pivot) {
              var cards = pivot.querySelectorAll('.arc-card');
              var startAngle = 20, endAngle = 160;

              function layoutArc() {
                var w = window.innerWidth;
                var radius, cardSize;
                if (w < 640) { radius = 220; cardSize = 70; }
                else if (w < 1024) { radius = 340; cardSize = 90; }
                else { radius = 440; cardSize = 110; }

                var container = document.getElementById('arc-container');
                if (container) container.style.height = (radius * 1.15) + 'px';

                var count = Math.max(cards.length, 2);
                var step = (endAngle - startAngle) / (count - 1);

                cards.forEach(function(card, i) {
                  var angle = startAngle + step * i;
                  var rad = angle * Math.PI / 180;
                  var x = Math.cos(rad) * radius;
                  var y = Math.sin(rad) * radius;

                  card.style.width = cardSize + 'px';
                  card.style.height = cardSize + 'px';
                  card.style.left = 'calc(50% + ' + x + 'px)';
                  card.style.bottom = y + 'px';
                  card.style.transform = 'translate(-50%, 50%)';
                  card.style.animationDelay = (i * 80) + 'ms';
                  card.style.zIndex = count - i;

                  // Create inner content if not done yet
                  if (!card.querySelector('.arc-card-inner')) {
                    var inner = document.createElement('div');
                    inner.className = 'arc-card-inner';
                    inner.style.transform = 'rotate(' + (angle / 5) + 'deg)';
                    var img = document.createElement('img');
                    img.src = card.getAttribute('data-src');
                    img.alt = 'Research ' + (i + 1);
                    img.draggable = false;
                    inner.appendChild(img);
                    card.appendChild(inner);
                  } else {
                    card.querySelector('.arc-card-inner').style.transform = 'rotate(' + (angle / 5) + 'deg)';
                  }
                });
              }

              layoutArc();
              window.addEventListener('resize', layoutArc);
            }
          });
        }
      ]
    };
  </script>
  <!-- Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-image-zoom@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#818cf8',
        primaryTextColor: '#e4e4e7',
        primaryBorderColor: '#6366f1',
        lineColor: '#52525b',
        secondaryColor: '#18181b',
        tertiaryColor: '#111114'
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  <!-- Swiper -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <!-- KaTeX math -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1"></script>
  <!-- Syntax -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
