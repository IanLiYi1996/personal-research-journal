<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Georgia, 'Latin Modern Roman', serif">
  <!-- Left: LLM alone -->
  <g>
    <text x="200" y="35" text-anchor="middle" fill="#707070" font-size="12" letter-spacing="2">BEFORE · LLM ALONE</text>
    <line x1="40" y1="48" x2="360" y2="48" stroke="#707070" stroke-width="0.5"/>

    <!-- LLM core -->
    <circle cx="200" cy="170" r="48" fill="#fdfcf8" stroke="#0a0a0a" stroke-width="2"/>
    <text x="200" y="166" text-anchor="middle" fill="#0a0a0a" font-weight="700" font-size="18">LLM</text>
    <text x="200" y="184" text-anchor="middle" fill="#333" font-size="11" font-style="italic">"smart engineer"</text>

    <!-- Symptoms scattered -->
    <text x="80" y="100" fill="#8a1a1a" font-size="11" font-style="italic">× context anxiety</text>
    <text x="290" y="100" fill="#8a1a1a" font-size="11" font-style="italic" text-anchor="end">× session amnesia</text>
    <text x="80" y="260" fill="#8a1a1a" font-size="11" font-style="italic">× self-eval bias</text>
    <text x="320" y="260" fill="#8a1a1a" font-size="11" font-style="italic" text-anchor="end">× no tools</text>
    <text x="80" y="285" fill="#8a1a1a" font-size="11" font-style="italic">× ad-hoc prompts</text>
    <text x="320" y="285" fill="#8a1a1a" font-size="11" font-style="italic" text-anchor="end">× no audit trail</text>

    <!-- output: blob -->
    <text x="200" y="320" text-anchor="middle" fill="#707070" font-size="11" font-style="italic">→ "感觉对" 的输出 / 无法复现</text>
  </g>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="320" stroke="#1a3a7a" stroke-width="0.8" stroke-dasharray="4,4"/>

  <!-- Right: LLM + Harness -->
  <g>
    <text x="700" y="35" text-anchor="middle" fill="#1a3a7a" font-size="12" letter-spacing="2" font-weight="700">AFTER · LLM IN A HARNESS</text>
    <line x1="540" y1="48" x2="860" y2="48" stroke="#1a3a7a" stroke-width="0.8"/>

    <!-- Outer harness frame -->
    <rect x="510" y="70" width="380" height="220" fill="#f5f3ea" stroke="#1a3a7a" stroke-width="2"/>
    <text x="700" y="92" text-anchor="middle" fill="#1a3a7a" font-size="11" letter-spacing="2" font-weight="700">HARNESS · "工作环境"</text>

    <!-- LLM core (smaller, inside) -->
    <circle cx="700" cy="180" r="40" fill="#fdfcf8" stroke="#0a0a0a" stroke-width="2"/>
    <text x="700" y="177" text-anchor="middle" fill="#0a0a0a" font-weight="700" font-size="16">LLM</text>
    <text x="700" y="194" text-anchor="middle" fill="#333" font-size="10" font-style="italic">same engineer</text>

    <!-- Surrounding harness components -->
    <g font-size="11" fill="#1a3a7a">
      <!-- 4 boxes around LLM -->
      <rect x="535" y="115" width="100" height="36" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1"/>
      <text x="585" y="132" text-anchor="middle" font-weight="700">Memory</text>
      <text x="585" y="145" text-anchor="middle" font-size="9" fill="#707070">cross-session</text>

      <rect x="765" y="115" width="100" height="36" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1"/>
      <text x="815" y="132" text-anchor="middle" font-weight="700">Skills</text>
      <text x="815" y="145" text-anchor="middle" font-size="9" fill="#707070">on-demand load</text>

      <rect x="535" y="208" width="100" height="36" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1"/>
      <text x="585" y="225" text-anchor="middle" font-weight="700">Spec / Plan</text>
      <text x="585" y="238" text-anchor="middle" font-size="9" fill="#707070">single source</text>

      <rect x="765" y="208" width="100" height="36" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1"/>
      <text x="815" y="225" text-anchor="middle" font-weight="700">Sub-agents</text>
      <text x="815" y="238" text-anchor="middle" font-size="9" fill="#707070">eval / review</text>
    </g>

    <!-- connections from LLM to 4 components -->
    <g stroke="#1a3a7a" stroke-width="1" stroke-dasharray="2,3">
      <line x1="664" y1="160" x2="635" y2="135"/>
      <line x1="736" y1="160" x2="765" y2="135"/>
      <line x1="664" y1="200" x2="635" y2="225"/>
      <line x1="736" y1="200" x2="765" y2="225"/>
    </g>

    <!-- output: structured -->
    <text x="700" y="320" text-anchor="middle" fill="#1a3a7a" font-size="11" font-style="italic" font-weight="700">→ 结构化产物 / 可审计 / 可复现</text>
  </g>

  <!-- center quote -->
  <text x="450" y="350" text-anchor="middle" fill="#0a0a0a" font-size="13" font-weight="700" font-style="italic">
    "Humans steer. Agents execute."  — 同一个 LLM，环境不同，产出天差地别
  </text>
</svg>
