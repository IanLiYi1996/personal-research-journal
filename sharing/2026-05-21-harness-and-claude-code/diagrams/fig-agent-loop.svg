<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Georgia, 'Latin Modern Roman', serif">
  <defs>
    <marker id="al-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a3a7a"/>
    </marker>
    <marker id="al-arr-end" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0a8a3a"/>
    </marker>
    <marker id="al-arr-loop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a5a1a"/>
    </marker>
  </defs>

  <!-- Title strip -->
  <text x="20" y="28" fill="#707070" font-size="11" letter-spacing="2">AGENT LOOP · 8-LINE CORE · LOOP = AGENT · MECHANISMS = HARNESS</text>
  <line x1="20" y1="36" x2="880" y2="36" stroke="#707070" stroke-width="0.5"/>

  <!-- USER input box -->
  <rect x="40" y="60" width="140" height="60" fill="#fdfcf8" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="110" y="82" text-anchor="middle" fill="#0a0a0a" font-weight="700" font-size="13">USER</text>
  <text x="110" y="100" text-anchor="middle" fill="#333" font-size="11">"读这篇 paper 总结一下"</text>
  <text x="110" y="113" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">问题 / 任务</text>

  <!-- arrow USER -> LLM -->
  <line x1="180" y1="90" x2="240" y2="90" stroke="#1a3a7a" stroke-width="1.5" marker-end="url(#al-arr)"/>

  <!-- LLM box (the brain) -->
  <rect x="240" y="60" width="180" height="100" fill="#f5f3ea" stroke="#1a3a7a" stroke-width="2"/>
  <text x="330" y="82" text-anchor="middle" fill="#1a3a7a" font-weight="700" font-size="13" letter-spacing="1">LLM · 推理</text>
  <text x="330" y="102" text-anchor="middle" fill="#0a0a0a" font-size="11">看 messages[] · 决定下一步</text>
  <text x="330" y="120" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">"我要调 read_paper"</text>
  <text x="330" y="138" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">"我要调 write_note"</text>
  <text x="330" y="153" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">"我做完了"</text>

  <!-- arrow LLM -> decision -->
  <line x1="420" y1="110" x2="465" y2="110" stroke="#1a3a7a" stroke-width="1.5" marker-end="url(#al-arr)"/>

  <!-- decision diamond: stop_reason? -->
  <polygon points="540,60 615,110 540,160 465,110" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
  <text x="540" y="100" text-anchor="middle" fill="#0a0a0a" font-weight="700" font-size="11">stop_reason?</text>
  <text x="540" y="120" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">tool_use / end</text>

  <!-- branch: tool_use (down) -->
  <line x1="540" y1="160" x2="540" y2="200" stroke="#8a5a1a" stroke-width="1.5" marker-end="url(#al-arr-loop)"/>
  <text x="552" y="180" fill="#8a5a1a" font-size="10" font-weight="700">"tool_use"</text>

  <!-- branch: end_turn (right) -->
  <line x1="615" y1="110" x2="700" y2="110" stroke="#0a8a3a" stroke-width="1.5" marker-end="url(#al-arr-end)"/>
  <text x="657" y="100" text-anchor="middle" fill="#0a8a3a" font-size="10" font-weight="700">"end_turn"</text>

  <!-- final output -->
  <rect x="700" y="80" width="160" height="60" fill="#e8f5e8" stroke="#0a8a3a" stroke-width="1.5"/>
  <text x="780" y="102" text-anchor="middle" fill="#0a8a3a" font-weight="700" font-size="12">RETURN · 完成</text>
  <text x="780" y="120" text-anchor="middle" fill="#0a0a0a" font-size="10" font-style="italic">把答案 / 笔记给 user</text>
  <text x="780" y="133" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">loop 退出</text>

  <!-- TOOL execution box -->
  <rect x="450" y="200" width="180" height="60" fill="#fdfcf8" stroke="#8a5a1a" stroke-width="1.5"/>
  <text x="540" y="222" text-anchor="middle" fill="#8a5a1a" font-weight="700" font-size="13">TOOL · 执行</text>
  <text x="540" y="240" text-anchor="middle" fill="#333" font-size="11">bash · read · write · API</text>
  <text x="540" y="253" text-anchor="middle" fill="#707070" font-size="10" font-style="italic">harness 真正动手干活</text>

  <!-- arrow TOOL -> result feedback -->
  <line x1="450" y1="230" x2="380" y2="230" stroke="#8a5a1a" stroke-width="1.5"/>
  <line x1="380" y1="230" x2="380" y2="200" stroke="#8a5a1a" stroke-width="1.5"/>
  <line x1="380" y1="200" x2="330" y2="200" stroke="#8a5a1a" stroke-width="1.5"/>
  <line x1="330" y1="200" x2="330" y2="160" stroke="#8a5a1a" stroke-width="1.5" marker-end="url(#al-arr-loop)"/>

  <!-- feedback label -->
  <text x="345" y="195" fill="#8a5a1a" font-size="10" font-style="italic">result 回灌</text>
  <text x="345" y="208" fill="#8a5a1a" font-size="10" font-style="italic">→ messages[]</text>

  <!-- Divider -->
  <line x1="20" y1="285" x2="880" y2="285" stroke="#707070" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Bottom annotation: agent vs harness -->
  <g font-size="11">
    <!-- Agent zone -->
    <text x="40" y="305" fill="#1a3a7a" font-weight="700" letter-spacing="2">AGENT (8 行内核)</text>
    <text x="40" y="322" fill="#333" font-size="10" font-style="italic">while True · llm · tool_use 触发 · result 回灌</text>

    <!-- Harness zone -->
    <text x="450" y="305" fill="#8a5a1a" font-weight="700" letter-spacing="2">HARNESS (剩下的一切)</text>
    <text x="450" y="322" fill="#333" font-size="10" font-style="italic">memory · skills · sub-agent · permission · spec · observability ...</text>
  </g>

  <!-- caption -->
  <text x="450" y="350" text-anchor="middle" fill="#0a0a0a" font-size="12" font-weight="700" font-style="italic">
    Loop 属于 agent · 后面 30 多页都在讲 harness 怎么把这个 loop 变得能可靠工作
  </text>
</svg>
