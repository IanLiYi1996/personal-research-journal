<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Georgia, 'Latin Modern Roman', serif">
  <!-- Center pentagon: SCIENTIFIC RIGOR -->
  <g>
    <!-- pentagon shape -->
    <polygon points="450,140 540,200 510,300 390,300 360,200" fill="#1a3a7a" stroke="#0a0a0a" stroke-width="2"/>
    <text x="450" y="220" text-anchor="middle" fill="#fdfcf8" font-weight="700" font-size="15" letter-spacing="2">SCIENTIFIC</text>
    <text x="450" y="240" text-anchor="middle" fill="#fdfcf8" font-weight="700" font-size="15" letter-spacing="2">RIGOR</text>
    <text x="450" y="265" text-anchor="middle" fill="#f5f3ea" font-size="10" font-style="italic">5 properties</text>
  </g>

  <!-- 5 surrounding cards -->
  <!-- ① Reproducible (top) -->
  <g>
    <rect x="320" y="30" width="260" height="80" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
    <text x="335" y="50" fill="#1a3a7a" font-weight="700" font-size="13">① 可重复</text>
    <text x="565" y="50" text-anchor="end" fill="#707070" font-size="11" font-style="italic">Reproducible</text>
    <line x1="335" y1="58" x2="565" y2="58" stroke="#1a3a7a" stroke-width="0.5"/>
    <text x="335" y="78" fill="#0a0a0a" font-size="11">spec.yaml 锁定 base_model /</text>
    <text x="335" y="93" fill="#0a0a0a" font-size="11">dataset / hyperparam 的 ID</text>
    <text x="335" y="105" fill="#707070" font-size="10" font-style="italic">→ 别人 git clone 即可复现</text>
  </g>

  <!-- ② Falsifiable (top right) -->
  <g>
    <rect x="640" y="100" width="240" height="80" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
    <text x="655" y="120" fill="#1a3a7a" font-weight="700" font-size="13">② 可证伪</text>
    <text x="865" y="120" text-anchor="end" fill="#707070" font-size="11" font-style="italic">Falsifiable</text>
    <line x1="655" y1="128" x2="865" y2="128" stroke="#1a3a7a" stroke-width="0.5"/>
    <text x="655" y="148" fill="#0a0a0a" font-size="11">TDD invariant 把"什么叫</text>
    <text x="655" y="163" fill="#0a0a0a" font-size="11">做对" 写成可执行代码</text>
    <text x="655" y="175" fill="#707070" font-size="10" font-style="italic">→ 失败有明确 RED 信号</text>
  </g>

  <!-- ③ Auditable (bottom right) -->
  <g>
    <rect x="640" y="320" width="240" height="80" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
    <text x="655" y="340" fill="#1a3a7a" font-weight="700" font-size="13">③ 可审计</text>
    <text x="865" y="340" text-anchor="end" fill="#707070" font-size="11" font-style="italic">Auditable</text>
    <line x1="655" y1="348" x2="865" y2="348" stroke="#1a3a7a" stroke-width="0.5"/>
    <text x="655" y="368" fill="#0a0a0a" font-size="11">DDD 文档 + wandb run +</text>
    <text x="655" y="383" fill="#0a0a0a" font-size="11">reviewer log</text>
    <text x="655" y="395" fill="#707070" font-size="10" font-style="italic">→ 整条 audit trail 完整</text>
  </g>

  <!-- ④ Compounding (bottom left) -->
  <g>
    <rect x="20" y="320" width="240" height="80" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
    <text x="35" y="340" fill="#1a3a7a" font-weight="700" font-size="13">④ 可累积</text>
    <text x="245" y="340" text-anchor="end" fill="#707070" font-size="11" font-style="italic">Compounding</text>
    <line x1="35" y1="348" x2="245" y2="348" stroke="#1a3a7a" stroke-width="0.5"/>
    <text x="35" y="368" fill="#0a0a0a" font-size="11">REFLECT 失败原因写回 DDD</text>
    <text x="35" y="383" fill="#0a0a0a" font-size="11">下次实验前自动读</text>
    <text x="35" y="395" fill="#707070" font-size="10" font-style="italic">→ 经验不再只在脑子里</text>
  </g>

  <!-- ⑤ Comparable (top left) -->
  <g>
    <rect x="20" y="100" width="240" height="80" fill="#fdfcf8" stroke="#1a3a7a" stroke-width="1.5"/>
    <text x="35" y="120" fill="#1a3a7a" font-weight="700" font-size="13">⑤ 可比较</text>
    <text x="245" y="120" text-anchor="end" fill="#707070" font-size="11" font-style="italic">Comparable</text>
    <line x1="35" y1="128" x2="245" y2="128" stroke="#1a3a7a" stroke-width="0.5"/>
    <text x="35" y="148" fill="#0a0a0a" font-size="11">三层评测 + 标准 metric</text>
    <text x="35" y="163" fill="#0a0a0a" font-size="11">benchmark + invariant + 定性</text>
    <text x="35" y="175" fill="#707070" font-size="10" font-style="italic">→ 不同实验能横向比</text>
  </g>

  <!-- spokes from pentagon -->
  <g stroke="#1a3a7a" stroke-width="0.8" stroke-dasharray="3,3" fill="none">
    <line x1="450" y1="140" x2="450" y2="110"/>
    <line x1="540" y1="200" x2="640" y2="140"/>
    <line x1="510" y1="300" x2="640" y2="360"/>
    <line x1="390" y1="300" x2="260" y2="360"/>
    <line x1="360" y1="200" x2="260" y2="140"/>
  </g>

  <!-- caption -->
  <text x="450" y="438" text-anchor="middle" fill="#0a0a0a" font-size="13" font-weight="700" font-style="italic">
    "AI 加速科研" 不是跑得快 — 是让 5 个属性从 "自觉" 变成 "机械化保证"
  </text>
  <text x="450" y="460" text-anchor="middle" fill="#707070" font-size="11" font-style="italic">反向自查：你最近一次实验，能勾几个？</text>
</svg>
